#################################
# Backend
#################################
backend = "glx";
vsync = true;
dbus = true;


#################################
# Shadows
#################################
shadow = true;
shadow-radius = 6;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.4;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Dunst'",
  "class_g = 'spectacle'",
  "class_g = 'slop'",
  "class_g = 'betterlockscreen'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Fading
#################################
# Fading is handled by animations below,
# keeping this enabled for fallback on non-animated windows
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 10;

#################################
# Transparency
#################################
inactive-opacity = 0.8;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "100:class_g = 'Rofi'",
  "100:class_g = 'rofi'",
  "74:class_g = 'Polybar'",
  "60:class_g = 'Dunst'"
];

#################################
# Corners
#################################
corner-radius = 10;
rounded-corners-exclude = [
  "class_g = 'Dunst'"
];

#################################
# Blur
#################################
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 7;
blur-background-exclude = [
  "class_g = 'firefox'",
  "class_g = 'maim'",
  "class_g = 'slop'",
  "class_g = 'betterlockscreen'",
  "window_type = 'tooltip'",
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'"
];


#################################
# Animations (FT-Labs)
#################################
animations = true;
animation-stiffness = 460;       # Higher = snappier, lower = floatier
animation-dampening = 18;        # Higher = less bounce
animation-mass = 1;
animation-for-open-window = "zoom";        # Options: zoom, slide-up, slide-down, slide-left, slide-right, fly-in
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-right";
animation-for-workspace-switch-out = "slide-left";
animation-for-transient-window = "slide-up";  # Popups, dialogs
animation-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Dunst'",
  "class_g = 'slop'",
  "class_g = 'maim'",
  "class_g = 'betterlockscreen'",
  "window_type = 'dock'",
  "window_type = 'tooltip'",
  "window_type = 'notification'"
];

#################################
# Performance Optimizations
#################################
detect-client-opacity = true;
detect-client-leader = true;

#################################
# Quality of Life
#################################
focus-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'rofi'"
];
invert-color-include = [];

#################################
# Performance Tweaks
#################################
use-damage = true;
unredir-if-possible = false;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
xrender-sync-fence = true;
