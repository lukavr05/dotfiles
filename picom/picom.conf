#################################
# Backend
#################################
backend = "glx";
vsync = true;
dbus = true;

#################################
# Shadows
#################################
shadow = false;
shadow-radius = 12;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.25;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "class_g = 'Dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Fading
#################################
# Fading is handled by animations below,
# keeping this enabled for fallback on non-animated windows
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 10;

#################################
# Transparency
#################################
inactive-opacity = 0.74;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "100:class_g = 'Rofi'",
  "100:class_g = 'rofi'"
];

#################################
# Corners
#################################
corner-radius = 10;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'code-oss'"
];

#################################
# Blur
#################################
blur-method = "dual_kawase";
blur-strength = 6;
blur-background-exclude = [
  "window_type = 'dock'",
  "class_g = 'firefox'"
];

#################################
# Animations (FT-Labs)
#################################
animations = true;
animation-stiffness = 500;       # Higher = snappier, lower = floatier
animation-dampening = 20;        # Higher = less bounce
animation-mass = 1;
animation-for-open-window = "zoom";        # Options: zoom, slide-up, slide-down, slide-left, slide-right, fly-in
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-right";
animation-for-workspace-switch-out = "slide-left";
animation-for-transient-window = "slide-up";  # Popups, dialogs
animation-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Dunst'",
  "window_type = 'dock'",
  "window_type = 'tooltip'",
  "window_type = 'notification'"
];

#################################
# Performance Optimizations
#################################
detect-client-opacity = true;
detect-client-leader = true;

#################################
# Quality of Life
#################################
unredir-if-possible-exclude = [];
focus-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'rofi'"
];
invert-color-include = [];

#################################
# Performance Tweaks
#################################
use-damage = true;
unredir-if-possible = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
glx-swap-method = 2;
xrender-sync-fence = true;