[colors]
background = #282828
background-alt = #373b41
foreground = #ebdbb2
primary = #d79921
secondary = #458588
alert = #cc241d
disabled = #707880

[bar/top-bar]
width = 1916
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 1
padding-right = 1

offset-y = 2
offset-x = 2


module-margin = 1

separator = |
separator-foreground = ${colors.disabled}
font-0 = GeistMono Nerd Font:size=12;2
font-1 = GeistMono Nerd Font:style=Bold:size=12;2
font-2 = Weather Icons:size=12;2
font-3 = FontAwesome 7 Free:style=Solid,Regular:size=12;2

modules-left = battery workspaces weather updates
modules-center = date
modules-right = pulseaudio brightness memory cpu temperature bluetooth wlan

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
format-charging = <animation-charging> <label-charging>
format-charging-foreground = #8ec07c
format-discharging = <ramp-capacity> <label-discharging>
format-low = <animation-low> <label-low>
format-low-foreground = ${colors.alert}

label-discharging = %percentage%%
label-charging = "ÔÉß %percentage%%"
label-low = %percentage%%

ramp-capacity-0 = " ÔČĄ"
ramp-capacity-1 = " ÔČÉ"
ramp-capacity-2 = " ÔČā"
ramp-capacity-3 = " ÔČĀ"
ramp-capacity-4 = " ÔČÄ"

low-at = 20

animation-charging-0 = " ÔČĄ"
animation-charging-1 = " ÔČÉ"
animation-charging-2 = " ÔČā"
animation-charging-3 = " ÔČĀ"
animation-charging-4 = " ÔČÄ"
; Framerate in milliseconds
animation-charging-framerate = 600

animation-low-0 = " ÔČĄ"
animation-low-1 = " ÔČÉ"
animation-low-framerate = 1500

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄ®  "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ůįĚü muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/wlan]
type = internal/network
interface = wlp0s20f3
interval = 3.0

; Only show when connected to WiFi
format-connected = <ramp-signal> <label-connected>
label-connected = "%essid%"
label-connected-foreground = ${colors.foreground}

; Hide when disconnected (or show minimal info)
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.disabled}
label-disconnected = ůį§Į No Signal

; WiFi signal strength icons
ramp-signal-0 = ůį§ü
ramp-signal-1 = ůį§Ę
ramp-signal-2 = ůį§®
ramp-signal-3 = ůį§®
ramp-signal-4 = ůį§®
ramp-signal-foreground = ${colors.primary}

click-left = "nm-applet"

[module/temperature]
type = internal/temperature
interval = 5
base-temperature = 30
warn-temperature = 70

; Whether or not to show units next to the temperature tokens (¬įC, ¬įF)
units = true
format = <ramp> <label>
format-warn = <ramp> <label-warn>

label = %temperature-c%

label-warn = "ÔĀ™ %temperature-c%"
label-warn-foreground = ${colors.alert}

ramp-0 = Ôčč
ramp-1 = ÔčČ
ramp-2 = Ôčá
ramp-foreground = ${colors.primary}

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}


[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth/bluetooth.sh
interval = 2
click-left = exec ~/.config/polybar/scripts/toggle_bluetooth.sh

[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather/smart-weather.sh
interval = 10
format = <label>
label = %output%
label-foreground = ${colors.foreground}
click-left = exec ~/.config/polybar/scripts/weather/toggle-weather.sh

[module/workspaces]
type = internal/bspwm

; Only show workspaces on the current monitor
pin-workspaces = true

; Format
format = <label-state> <label-mode>
format-background = ${colors.background-alt}
format-padding = 1

; Workspace labels
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = #282828
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

label-separator = " "

; Double click to switch workspace
click-left = bspc desktop -f {desktop}

[module/brightness]
type = custom/script
exec = brightnessctl -m | cut -d, -f4 | tr -d '%'
format-prefix = "ÔÜÖ "
format-prefix-foreground = ${colors.primary}
format = <label>
label = %output%%
label-foreground = ${colors.foreground}
click-left = brightnessctl set +10%
click-right = brightnessctl set 10%-
scroll-up = brightnessctl set +10%
scroll-down = brightnessctl set 10%-

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/check_updates.sh
interval = 120
format-prefix = "ůįöį "
format-prefix-foreground = ${colors.primary}
format = <label>
label = %output%
label-foreground = ${colors.foreground}
click-left = "/home/luka/.local/kitty.app/bin/kitty --title 'System Updates' -- sh -c 'echo \"Checking for available updates...\"; echo; apt list --upgradable 2>/dev/null; echo \"\nPress any key to exit...\"; read -n 1'"

[settings]
screenchange-reload = true
pseudo-transparency = false


; vim:ft=dosini
